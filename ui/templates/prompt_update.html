{% extends "base.html" %}
{% block title %}pvm - {{ prompt_id }} 수정{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold font-mono">{{ prompt_id }}</h1>
      <p class="text-sm text-gray-500 mt-1">
        현재 버전: <span class="font-mono font-medium">v{{ current_version }}</span>
      </p>
    </div>
    <a href="/prompts/{{ prompt_id }}" class="px-3 py-1.5 text-sm bg-gray-100 text-gray-700 rounded hover:bg-gray-200">&larr; 돌아가기</a>
  </div>

  {% if message %}
  <div class="bg-yellow-50 border border-yellow-200 text-yellow-700 px-4 py-3 rounded text-sm">
    {{ message }}
  </div>
  {% endif %}

  <!-- Tab Switcher -->
  <div class="flex border-b">
    <button onclick="switchTab('form')" id="tab-form"
            class="px-4 py-2 text-sm font-medium border-b-2 border-green-600 text-green-600">폼 입력</button>
    <button onclick="switchTab('editor')" id="tab-editor"
            class="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700">YAML 편집기</button>
    <button onclick="switchTab('upload')" id="tab-upload"
            class="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700">파일 업로드</button>
  </div>

  <!-- Form -->
  <div id="panel-form" class="bg-white rounded-lg shadow p-6">
    <form method="post" action="/prompts/{{ prompt_id }}/update/form" class="space-y-6">

      <div>
        <h3 class="text-sm font-bold text-red-500 mb-4 border-b border-red-200 pb-2">필수 항목</h3>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">ID</label>
            <input type="text" value="{{ prompt_id }}" disabled
                   class="w-full text-sm font-mono border rounded px-3 py-2 bg-gray-100 text-gray-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Prompt</label>
            <textarea name="prompt_text" rows="6" required
                      class="w-full text-sm font-mono border rounded px-3 py-2">{{ prompt_text }}</textarea>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">LLM Provider</label>
              <input type="text" name="llm_provider" required value="{{ llm_provider }}"
                     class="w-full text-sm font-mono border rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">LLM Model</label>
              <input type="text" name="llm_model" required value="{{ llm_model }}"
                     class="w-full text-sm font-mono border rounded px-3 py-2">
            </div>
          </div>
        </div>
      </div>

      <div>
        <h3 class="text-sm font-bold text-gray-500 mb-4 border-b border-gray-200 pb-2">선택 항목</h3>
        <div class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">설명</label>
              <input type="text" name="description" value="{{ description }}"
                     class="w-full text-sm border rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">작성자</label>
              <input type="text" name="author" value="{{ author }}"
                     class="w-full text-sm border rounded px-3 py-2">
            </div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Temperature</label>
              <input type="number" name="temperature" step="0.01" min="0" max="2" value="{{ temperature }}"
                     class="w-full text-sm font-mono border rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Max Tokens</label>
              <input type="number" name="max_tokens" step="1" min="1" value="{{ max_tokens }}"
                     class="w-full text-sm font-mono border rounded px-3 py-2">
            </div>
          </div>
        </div>
      </div>

      <div>
        <h3 class="text-sm font-bold text-blue-500 mb-4 border-b border-blue-200 pb-2">추가 필드</h3>
        <div id="extra-fields" class="space-y-2">
          {% for key, value in extra_fields %}
          <div class="flex gap-2 items-center">
            <input type="text" name="extra_keys" value="{{ key }}" class="w-1/3 text-sm font-mono border rounded px-3 py-2">
            <input type="text" name="extra_values" value="{{ value }}" class="flex-1 text-sm font-mono border rounded px-3 py-2">
            <button type="button" onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-600 text-sm px-2">&times;</button>
          </div>
          {% endfor %}
        </div>
        <button type="button" onclick="addExtraField()"
                class="mt-2 text-sm text-green-600 hover:underline">+ 필드 추가</button>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">버전 단위</label>
        <div class="grid grid-cols-3 gap-2">
          <label class="bump-option cursor-pointer">
            <input type="radio" name="bump_level" value="patch" checked class="sr-only bump-radio">
            <div class="bump-box border-2 border-green-500 bg-green-50 rounded-lg p-3 text-center transition">
              <div class="text-sm font-bold text-gray-800">Patch</div>
              <div class="bump-ver text-xs font-mono text-green-700 mt-0.5"></div>
              <div class="text-xs text-gray-400 mt-1.5 leading-snug">오탈자·표현<br>미세 수정</div>
            </div>
          </label>
          <label class="bump-option cursor-pointer">
            <input type="radio" name="bump_level" value="minor" class="sr-only bump-radio">
            <div class="bump-box border-2 border-gray-200 rounded-lg p-3 text-center transition">
              <div class="text-sm font-bold text-gray-800">Minor</div>
              <div class="bump-ver text-xs font-mono text-green-700 mt-0.5"></div>
              <div class="text-xs text-gray-400 mt-1.5 leading-snug">내용 추가<br>또는 변경</div>
            </div>
          </label>
          <label class="bump-option cursor-pointer">
            <input type="radio" name="bump_level" value="major" class="sr-only bump-radio">
            <div class="bump-box border-2 border-gray-200 rounded-lg p-3 text-center transition">
              <div class="text-sm font-bold text-gray-800">Major</div>
              <div class="bump-ver text-xs font-mono text-green-700 mt-0.5"></div>
              <div class="text-xs text-gray-400 mt-1.5 leading-snug">전면 개편</div>
            </div>
          </label>
        </div>
      </div>

      <button type="submit" class="w-full px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">
        버전 업데이트
      </button>
    </form>
  </div>

  <!-- YAML Editor -->
  <div id="panel-editor" class="bg-white rounded-lg shadow p-6 hidden">
    <form method="post" action="/prompts/{{ prompt_id }}/update" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">YAML 템플릿</label>
        <textarea name="yaml_content" rows="20" required
                  class="w-full text-sm font-mono border rounded px-3 py-2 bg-gray-50 focus:bg-white">{{ yaml_content }}</textarea>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">버전 단위</label>
        <div class="grid grid-cols-3 gap-2">
          <label class="bump-option cursor-pointer">
            <input type="radio" name="bump_level" value="patch" checked class="sr-only bump-radio">
            <div class="bump-box border-2 border-green-500 bg-green-50 rounded-lg p-3 text-center transition">
              <div class="text-sm font-bold text-gray-800">Patch</div>
              <div class="bump-ver text-xs font-mono text-green-700 mt-0.5"></div>
              <div class="text-xs text-gray-400 mt-1.5 leading-snug">오탈자·표현<br>미세 수정</div>
            </div>
          </label>
          <label class="bump-option cursor-pointer">
            <input type="radio" name="bump_level" value="minor" class="sr-only bump-radio">
            <div class="bump-box border-2 border-gray-200 rounded-lg p-3 text-center transition">
              <div class="text-sm font-bold text-gray-800">Minor</div>
              <div class="bump-ver text-xs font-mono text-green-700 mt-0.5"></div>
              <div class="text-xs text-gray-400 mt-1.5 leading-snug">내용 추가<br>또는 변경</div>
            </div>
          </label>
          <label class="bump-option cursor-pointer">
            <input type="radio" name="bump_level" value="major" class="sr-only bump-radio">
            <div class="bump-box border-2 border-gray-200 rounded-lg p-3 text-center transition">
              <div class="text-sm font-bold text-gray-800">Major</div>
              <div class="bump-ver text-xs font-mono text-green-700 mt-0.5"></div>
              <div class="text-xs text-gray-400 mt-1.5 leading-snug">전면 개편</div>
            </div>
          </label>
        </div>
      </div>
      <button type="submit" class="w-full px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">
        버전 업데이트
      </button>
    </form>
  </div>

  <!-- File Upload -->
  <div id="panel-upload" class="bg-white rounded-lg shadow p-6 hidden">
    <form method="post" action="/prompts/{{ prompt_id }}/update/upload" enctype="multipart/form-data" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">YAML 템플릿 파일</label>
        <input type="file" name="template_file" accept=".yaml,.yml" required
               class="w-full text-sm border rounded px-3 py-2 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:bg-green-50 file:text-green-700 hover:file:bg-green-100">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">버전 단위</label>
        <div class="grid grid-cols-3 gap-2">
          <label class="bump-option cursor-pointer">
            <input type="radio" name="bump_level" value="patch" checked class="sr-only bump-radio">
            <div class="bump-box border-2 border-green-500 bg-green-50 rounded-lg p-3 text-center transition">
              <div class="text-sm font-bold text-gray-800">Patch</div>
              <div class="bump-ver text-xs font-mono text-green-700 mt-0.5"></div>
              <div class="text-xs text-gray-400 mt-1.5 leading-snug">오탈자·표현<br>미세 수정</div>
            </div>
          </label>
          <label class="bump-option cursor-pointer">
            <input type="radio" name="bump_level" value="minor" class="sr-only bump-radio">
            <div class="bump-box border-2 border-gray-200 rounded-lg p-3 text-center transition">
              <div class="text-sm font-bold text-gray-800">Minor</div>
              <div class="bump-ver text-xs font-mono text-green-700 mt-0.5"></div>
              <div class="text-xs text-gray-400 mt-1.5 leading-snug">내용 추가<br>또는 변경</div>
            </div>
          </label>
          <label class="bump-option cursor-pointer">
            <input type="radio" name="bump_level" value="major" class="sr-only bump-radio">
            <div class="bump-box border-2 border-gray-200 rounded-lg p-3 text-center transition">
              <div class="text-sm font-bold text-gray-800">Major</div>
              <div class="bump-ver text-xs font-mono text-green-700 mt-0.5"></div>
              <div class="text-xs text-gray-400 mt-1.5 leading-snug">전면 개편</div>
            </div>
          </label>
        </div>
      </div>
      <button type="submit" class="w-full px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">
        버전 업데이트
      </button>
    </form>
  </div>
</div>

<script>
function addExtraField() {
  const container = document.getElementById('extra-fields');
  const row = document.createElement('div');
  row.className = 'flex gap-2 items-center';
  row.innerHTML = `
    <input type="text" name="extra_keys" placeholder="키" class="w-1/3 text-sm font-mono border rounded px-3 py-2">
    <input type="text" name="extra_values" placeholder="값" class="flex-1 text-sm font-mono border rounded px-3 py-2">
    <button type="button" onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-600 text-sm px-2">&times;</button>
  `;
  container.appendChild(row);
}

// 버전 단위 카드 UI
(function () {
  const CUR = "{{ current_version }}";
  function nextVer(ver, level) {
    const [maj, min, pat] = ver.split('.').map(Number);
    if (level === 'patch') return `${maj}.${min}.${pat + 1}`;
    if (level === 'minor') return `${maj}.${min + 1}.0`;
    if (level === 'major') return `${maj + 1}.0.0`;
  }
  document.querySelectorAll('.bump-option').forEach(label => {
    const radio = label.querySelector('.bump-radio');
    const box   = label.querySelector('.bump-box');
    const verEl = label.querySelector('.bump-ver');
    if (CUR && verEl) verEl.textContent = `→ v${nextVer(CUR, radio.value)}`;
    label.addEventListener('click', () => {
      const form = label.closest('form');
      form.querySelectorAll('.bump-box').forEach(b => {
        b.classList.remove('border-green-500', 'bg-green-50');
        b.classList.add('border-gray-200');
      });
      box.classList.remove('border-gray-200');
      box.classList.add('border-green-500', 'bg-green-50');
    });
  });
})();

function switchTab(tab) {
  const tabs = ['form', 'editor', 'upload'];
  tabs.forEach(t => {
    document.getElementById('panel-' + t).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById('tab-' + t);
    btn.classList.toggle('border-green-600', t === tab);
    btn.classList.toggle('text-green-600', t === tab);
    btn.classList.toggle('border-transparent', t !== tab);
    btn.classList.toggle('text-gray-500', t !== tab);
  });
}
</script>
{% endblock %}
