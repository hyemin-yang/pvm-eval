<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}pvm{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html/bundles/css/diff2html.min.css">
  <script src="https://cdn.jsdelivr.net/npm/diff2html/bundles/js/diff2html-ui.min.js"></script>
  <link rel="stylesheet" href="/static/style.css">
  <script>
  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = orig, 1500);
    });
  }
  </script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex">
  <!-- Sidebar -->
  <aside class="w-56 bg-gray-900 text-white min-h-screen fixed left-0 top-0 flex flex-col">
    <div class="px-5 py-5">
      <a href="/" class="text-xl font-bold text-green-400 tracking-tight">pvm</a>
      <p class="text-gray-500 text-xs mt-1">prompt version manager</p>
    </div>
    <nav class="flex-1 px-3 space-y-1">
      <a href="/" class="flex items-center gap-3 px-3 py-2.5 rounded text-sm font-medium text-gray-300 hover:bg-gray-800 hover:text-white transition">
        <span>📊</span> Dashboard
      </a>
      <a href="/prompts" class="flex items-center gap-3 px-3 py-2.5 rounded text-sm font-medium text-gray-300 hover:bg-gray-800 hover:text-white transition">
        <span>📝</span> Prompts
      </a>
      <a href="/snapshots" class="flex items-center gap-3 px-3 py-2.5 rounded text-sm font-medium text-gray-300 hover:bg-gray-800 hover:text-white transition">
        <span>📦</span> Snapshots
      </a>
      <a href="/history" class="flex items-center gap-3 px-3 py-2.5 rounded text-sm font-medium text-gray-300 hover:bg-gray-800 hover:text-white transition">
        <span>📜</span> History
      </a>
    </nav>
    <div class="px-3 pb-4">
      <a href="/prompts/add" class="flex items-center justify-center gap-2 px-3 py-2.5 rounded border border-dashed border-gray-600 text-sm font-medium text-gray-400 hover:border-green-400 hover:text-green-400 transition">
        + Add Prompt
      </a>
    </div>
    <div class="px-5 py-3 text-xs text-gray-600 border-t border-gray-800">
      pvm local ui
    </div>
  </aside>

  <!-- Main Content -->
  <main class="ml-56 flex-1 px-8 py-8 fade-in">
    <div class="max-w-7xl mx-auto">
      {% block content %}{% endblock %}
    </div>
  </main>
</body>
</html>
