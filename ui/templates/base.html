<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}pvm{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html/bundles/css/diff2html.min.css">
  <script src="https://cdn.jsdelivr.net/npm/diff2html/bundles/js/diff2html-ui.min.js"></script>
  <link rel="stylesheet" href="/static/style.css">
  <script>
  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      const orig = btn.textContent;
      btn.textContent = '복사됨!';
      setTimeout(() => btn.textContent = orig, 1500);
    });
  }
  </script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex">
  <!-- Sidebar -->
  <aside class="w-64 bg-gray-900 text-white min-h-screen fixed left-0 top-0 flex flex-col">
    <div class="px-5 py-5">
      <a href="/" class="text-2xl font-bold text-green-400 tracking-tight">pvm</a>
      <p class="text-gray-500 text-sm mt-1">Prompt Version Manager</p>
    </div>
    <nav class="flex-1 px-4 space-y-1">
      <a href="/" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition sidebar-nav-item">
        <span class="sidebar-icon">📊</span> Dashboard
      </a>
      <a href="/prompts" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition sidebar-nav-item">
        <span class="sidebar-icon">📝</span> Prompt
      </a>
      <a href="/tree" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition sidebar-nav-item">
        <span class="sidebar-icon">🌲</span> Tree
      </a>

      <!-- API Key Settings -->
      <a href="/settings"
         class="flex items-start gap-3 px-4 py-3 rounded-lg transition sidebar-nav-item
                {% if api_keys_missing() %}bg-yellow-900/40 text-yellow-300 hover:bg-yellow-900/60
                {% else %}text-gray-300 hover:bg-gray-800 hover:text-white{% endif %}">
        <span class="sidebar-icon mt-0.5">🔑</span>
        <span class="flex-1 leading-tight">
          <span class="block text-sm font-medium">API Key 설정</span>
          <span class="block text-xs mt-0.5
                       {% if api_keys_missing() %}text-yellow-400{% else %}text-gray-500{% endif %}">
            {% if api_keys_missing() %}⚠ 키 미설정 — 클릭하여 입력{% else %}Judge 평가용 API 키{% endif %}
          </span>
        </span>
      </a>
    </nav>
    <div class="px-4 pb-5 mt-2">
      <a href="/prompts/add" class="flex items-center justify-center gap-2 px-4 py-3 rounded-lg border border-dashed border-gray-600 text-gray-400 hover:border-green-400 hover:text-green-400 transition sidebar-nav-item">
        + Prompt 추가
      </a>
    </div>
    <div class="px-6 py-3 text-xs text-gray-600 border-t border-gray-800">
      pvm local ui
    </div>
  </aside>

  <!-- Main Content -->
  <main class="ml-64 flex-1 px-8 py-8 fade-in {% block main_class %}{% endblock %}">
    <div class="max-w-7xl mx-auto {% block content_wrapper_class %}{% endblock %}">
      {% block content %}{% endblock %}
    </div>
  </main>
</body>
</html>
